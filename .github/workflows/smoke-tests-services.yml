name: Smoke Tests (Service Containers)

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      suite:
        description: Smoke suite to run
        required: true
        default: core
        type: choice
        options:
          - core
          - full

jobs:
  smoke-services:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="echo 'db.runCommand({ ping: 1 })' | mongosh mongodb://localhost:27017/test --quiet"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run selected smoke suite (service containers)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.suite }}" = "full" ]; then
            npm run test:smoke:nightly
          else
            npm run test:smoke:ci
          fi
        env:
          NODE_ENV: test
          PORT: 6000
          MONGO_URI: mongodb://127.0.0.1:27017/ubuy_smoke_ci
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: smoke-ci-jwt-secret
