name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Smoke suite to run
        required: true
        default: core
        type: choice
        options:
          - core
          - full

jobs:
  smoke-manual:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run selected smoke suite
        run: |
          if [ "${{ inputs.suite }}" = "full" ]; then
            npm run test:smoke:nightly
          else
            npm run test:smoke:ci
          fi
        env:
          NODE_ENV: test
          PORT: 6000
          MONGO_URI: ${{ secrets.MONGO_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
